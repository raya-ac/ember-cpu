<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body style="margin:0;overflow:hidden">
<script>
window.addEventListener('message', function(e) {
  if (e.data.type === 'key' && Module._keyQueue) {
    Module._keyQueue.push({ pressed: e.data.pressed, key: e.data.key });
  }
});

var Module = {
  _keyQueue: [],
  _startTime: Date.now(),
  print: function(t) { parent.postMessage({type:'log', text:t}, '*'); },
  printErr: function(t) { parent.postMessage({type:'err', text:t}, '*'); },
  onRuntimeInitialized: function() {
    parent.postMessage({type:'ready'}, '*');
  }
};
// ember_draw_frame and ember_get_key are now handled inside the Emscripten closure
// via addToLibrary — they use HEAPU8/HEAP32 directly and postMessage frames to parent
</script>
<script src="doom-ember.js"></script>
</body>
</html>
